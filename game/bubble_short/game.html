<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title> Bubble Shooter </title>
    <!-- Font Awesome 6 (Free Icons CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
   
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen" class="screen active">
    <div class="premiums-card" style="text-align: center; width: 340px;">
        <div class="progress-container"><div class="progress-fill" id="loadFill"></div></div>
        <div id="loadPercentText" style="color: #b8e2ff; margin-top: 12px; font-weight: 600;">Loading 0%</div>
        <div style="margin-top: 18px; color: #8ccdff;"><i class="fas fa-sync-alt"></i> Ready to pop!</div>
    </div>
</div>

<!-- MAIN MENU -->
<div id="mainMenu" class="screen">
    <div style="text-align: center; width: 100%;">
        <div class="premium-card" style="display: inline-block; margin-bottom: 35px;">
            <div style="font-size: 2.4rem; font-weight: 800; color: #ebf5ff;"><i class="fas fa-bubble"></i> BUBBLE SHORT GAME</div>
            <div style="color: #b8e2ff;">Match 3, clear the deep blue!</div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 18px; align-items: center; max-width: 290px; margin: 0 auto;">
            <button class="btn-premium" id="playNowBtn"><i class="fas fa-play"></i> PLAY NOW</button>
            <button class="btn-premium btn-premium-secondary" id="levelSelectMenuBtn"><i class="fas fa-map-marked-alt"></i> LEVEL SELECT</button>
            <button class="btn-premium btn-premium-secondary" id="soundMenuBtn"><i class="fas fa-volume-up"></i> SOUND ON</button>
        </div>
        <p style="margin-top: 40px; color: #cdeeff; font-weight: 500;"><i class="fas fa-arrows-alt"></i> Tap & Drag to aim | Release to shoot</p>
    </div>
</div>

<!-- LEVEL SELECT -->
<div id="levelSelectScreen" class="screen">
    <div style="width: 100%; max-width: 600px; text-align: center;">
        <div class="premium-card" style="margin-bottom: 20px;">
            <!-- <h2 style="color: #d9f0ff;"><i class="fas fa-globe-americas"></i> SELECT OCEAN WORLD</h2> -->
        </div>
        <div class="level-grid" id="levelGrid"></div>
        <button class="btn-premium btn-premium-secondary" id="backToMenuBtn"><i class="fas fa-arrow-left"></i> BACK TO MENU</button>
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
    <div class="game-wrapper">
        <div class="game-header">
            <div class="stat-badge"><i class="fas fa-flag-checkered"></i> LVL <span id="currentLevelNum">1</span></div>
            <div class="stat-badge"><i class="fas fa-star"></i> SCORE <span id="currentScore">0</span></div>
            <div class="stat-badge"><i class="fas fa-circle"></i> BALLS <span id="currentBalls">35</span></div>
            <button id="pauseGameBtn" style="background:#2a6f8f; border:none; border-radius: 40px; padding: 6px 15px; font-weight: bold; color:white;"><i class="fas fa-pause"></i></button>
        </div>
        <canvas id="gameCanvas" width="500" height="600" style="width:100%; max-width: 520px; aspect-ratio: 500/600;"></canvas>
        <div class="next-ball-panel">
            <span style="color:#c2edff; font-weight: 600;"><i class="fas fa-eye"></i> NEXT BUBBLE</span>
            <div id="nextBallPreview" class="next-ball"></div>
            <span style="color:#ffd966;"><i class="fas fa-crosshairs"></i> AIM & SHOOT</span>
        </div>
        <div class="action-row">
            <button class="btn-premium btn-premium-secondary" id="restartLevelBtn"><i class="fas fa-undo-alt"></i> RESTART</button>
            <button class="btn-premium btn-premium-secondary" id="exitGameMenuBtn"><i class="fas fa-home"></i> MENU</button>
        </div>
    </div>
</div>

<!-- PAUSE POPUP -->
<div id="pausePopup" class="popup-overlay">
    <div class="popup-content">
        <h2><i class="fas fa-pause-circle"></i> GAME PAUSED</h2>
        <button id="resumeGameBtn" class="btn-premium" style="margin: 12px;"><i class="fas fa-play"></i> RESUME</button>
        <button id="restartPauseBtn" class="btn-premium btn-premium-secondary"><i class="fas fa-redo-alt"></i> RESTART</button>
        <button id="menuPauseBtn" class="btn-premium btn-premium-secondary"><i class="fas fa-sign-out-alt"></i> MENU</button>
    </div>
</div>

<!-- LEVEL COMPLETE -->
<div id="levelCompletePopup" class="popup-overlay">
    <div class="popup-content">
        <h2><i class="fas fa-trophy"></i> LEVEL COMPLETE!</h2>
        <p>Score: <span id="finalScoreVal">0</span></p>
        <div id="starsResult" style="font-size: 2rem;"></div>
        <button id="nextLevelActionBtn" class="btn-premium"><i class="fas fa-forward"></i> NEXT LEVEL</button>
        <button id="replayLevelActionBtn" class="btn-premium btn-premium-secondary"><i class="fas fa-repeat"></i> REPLAY</button>
        <button id="levelSelectCompleteBtn" class="btn-premium btn-premium-secondary"><i class="fas fa-map"></i> LEVELS</button>
    </div>
</div>

<!-- GAME OVER -->
<div id="gameOverPopup" class="popup-overlay">
    <div class="popup-content" style="background: #f4f9ff;">
        <h2><i class="fas fa-skull"></i> GAME OVER</h2>
        <p>Final Score: <span id="gameOverScoreVal">0</span></p>
        <button id="retryGameBtn" class="btn-premium"><i class="fas fa-sync-alt"></i> TRY AGAIN</button>
        <button id="gameOverMenuBtn" class="btn-premium btn-premium-secondary"><i class="fas fa-home"></i> MENU</button>
    </div>
</div>
<script src="script.js"></script>

</body>
</html>
