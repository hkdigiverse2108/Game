<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Jam HD | Premium Car Puzzle</title>
    <meta name="description"
        content="Experience the ultimate HD parking jam puzzle game. Challenge your mind with smooth animations and premium car designs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="particles-container"></div>

    <div id="loading-screen" class="screen active">
        <div class="logo logo-large">PARKING<span>JAM</span> HD</div>
        <div class="loader-container">
            <div class="loader-car car horizontal">
                <div class="wheel w-tl"></div>
                <div class="wheel w-tr"></div>
                <div class="wheel w-bl"></div>
                <div class="wheel w-br"></div>
                <div class="mirror m-left"></div>
                <div class="mirror m-right"></div>
                <div class="car-body"></div>
                <div class="car-cabin"></div>
                <div class="lights-front"></div>
                <div class="lights-back"></div>
            </div>
            <div class="loader-bar">
                <div id="loader-progress" class="loader-progress"></div>
            </div>
            <div id="loader-text" class="loader-text">0%</div>
        </div>
    </div>

    <div id="level-select-screen" class="screen">
        <header class="level-header">
            <div class="logo">PARKING<span>JAM</span> HD</div>
            <button id="home-btn" class="icon-button" title="Home">
                <i class="fa-solid fa-house"></i>
            </button>
        </header>
        <div class="levels-wrapper">
            <div class="levels-grid" id="levels-grid">
                <!-- Level buttons generated by JS -->
            </div>
        </div>
        <div class="level-pagination-bar">
            <button id="prev-page-btn" class="pagination-arrow-btn" title="Previous Page">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div class="page-indicator" id="page-indicator">Page 1</div>
            <div class="page-dots" id="page-dots"></div>
            <button id="next-page-btn" class="pagination-arrow-btn" title="Next Page">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <div id="game-container" class="screen">
        <header class="game-header">
            <div class="header-left">
                <button id="levels-btn" class="icon-button icon-button-sm" title="Back to Levels">
                    <i class="fa-solid fa-grid"></i>
                </button>
                <div class="logo">PARKING<span>JAM</span> HD</div>
            </div>
            <div class="stats">
                <div id="lives-container" class="lives-indicator">
                    <span class="life-dot"></span>
                    <span class="life-dot"></span>
                    <span class="life-dot"></span>
                </div>
                <div class="stat-item">Time: <span id="timer-display"
                        style="color:var(--accent-color); font-weight:800; font-size:1.3rem;">00:00</span></div>
                <div class="stat-item">Level: <span id="level-num">1</span></div>
            </div>
        </header>

        <div id="board-wrapper">
            <div id="game-board">
                <!-- Cars will be injected here -->
            </div>
        </div>

        <div id="ui-overlay" class="hidden">
            <div class="glass-card">
                <h2 id="overlay-title">Congratulations 🎉!</h2>
                <div id="star-rating" class="star-rating">
                    <span class="star" id="star-1">★</span>
                    <span class="star" id="star-2">★</span>
                    <span class="star" id="star-3">★</span>
                </div>
                <p id="overlay-desc">Level Passed</p>
                <div class="overlay-buttons">
                    <button id="replay-btn" class="glass-button">REPLAY</button>
                    <button id="next-level-btn" class="glow-button">NEXT LEVEL</button>
                </div>
            </div>
        </div>

        <footer>
            <button id="back-to-level-btn" class="glass-button back-level-button">LEVELS</button>
            <button id="reset-btn" class="glass-button">RESET</button>
        </footer>
    </div>

    <script src="game.js"></script>
</body>

</html>
