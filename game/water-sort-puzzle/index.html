<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="3D Water Sort Puzzle - Immersive puzzle game with realistic liquid physics and stunning visuals">
    <title>3D Water Sort Puzzle | Modern GUI</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="overflow-hidden antialiased text-white">
    <!-- Responsive Background -->
    <div class="game-background transition-opacity duration-1000" id="global-bg"></div>

    <!-- Loader Screen -->
    <div id="loader-screen" class="fixed inset-0 z-[200] flex flex-col items-center justify-center transition-opacity duration-700 ease-in-out">
        <img src="images/thumb.png" alt="Water Sort Logo" class="w-[300px] max-w-[80%] drop-shadow-[0_0_20px_rgba(0,180,255,0.4)] mb-12 animate-pulse object-contain">
        <div class="loader-spinner"></div>
    </div>

    <!-- Main App Root (Hidden until load finishes) -->
    <div id="app-root" class="relative w-full h-screen overflow-hidden opacity-0 transition-opacity duration-[1000ms]">
        
        <!-- Main Menu Panel -->
        <div id="menu-panel" class="absolute inset-0 z-50 flex flex-col items-center overflow-y-auto custom-scroll transition-all duration-700 ease-out py-10 px-4">
            <!-- Centralized Logo for Menu -->
            <div class="w-full flex justify-center mt-auto mb-8 transform scale-100 hover:scale-105 transition-transform duration-500 shrink-0">
                <img src="images/thumb.png" alt="Logo" class="w-[350px] max-w-[85%] drop-shadow-2xl object-contain">
            </div>

            <!-- Redesigned Grid Layout for Levels -->
            <div class="bg-white/5 backdrop-blur-2xl border border-white/10 rounded-[2rem] p-6 md:p-8 shadow-[0_20px_60px_rgba(0,0,0,0.6)] w-full max-w-lg shrink-0">
                <h2 class="text-center text-sm font-bold tracking-widest text-gray-400 uppercase mb-6">Select Difficulty</h2>
                <div class="grid grid-cols-2 gap-4">
                    <!-- Easy -->
                    <button data-level="0" class="level-btn relative overflow-hidden group py-6 rounded-2xl bg-white-[0.03] hover:bg-white/10 border border-white/10 transition-all duration-300 shadow-md hover:shadow-[0_0_20px_rgba(52,211,153,0.2)] flex flex-col items-center gap-3">
                        <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <svg class="w-8 h-8 text-emerald-400 transform group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span class="text-lg font-bold tracking-wider text-emerald-50">EASY</span>
                    </button>
                    <!-- Medium -->
                    <button data-level="1" class="level-btn relative overflow-hidden group py-6 rounded-2xl bg-white-[0.03] hover:bg-white/10 border border-white/10 transition-all duration-300 shadow-md hover:shadow-[0_0_20px_rgba(96,165,250,0.2)] flex flex-col items-center gap-3">
                        <div class="absolute inset-0 bg-gradient-to-br from-blue-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <svg class="w-8 h-8 text-blue-400 transform group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        <span class="text-lg font-bold tracking-wider text-blue-50">NORMAL</span>
                    </button>
                    <!-- Hard -->
                    <button data-level="2" class="level-btn relative overflow-hidden group py-6 rounded-2xl bg-white-[0.03] hover:bg-white/10 border border-white/10 transition-all duration-300 shadow-md hover:shadow-[0_0_20px_rgba(251,146,60,0.2)] flex flex-col items-center gap-3">
                        <div class="absolute inset-0 bg-gradient-to-br from-orange-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <svg class="w-8 h-8 text-orange-400 transform group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z"></path></svg>
                        <span class="text-lg font-bold tracking-wider text-orange-50">HARD</span>
                    </button>
                    <!-- Expert -->
                    <button data-level="3" class="level-btn relative overflow-hidden group py-6 rounded-2xl bg-white-[0.03] hover:bg-white/10 border border-white/10 transition-all duration-300 shadow-md hover:shadow-[0_0_20px_rgba(192,132,252,0.2)] flex flex-col items-center gap-3">
                        <div class="absolute inset-0 bg-gradient-to-br from-purple-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <svg class="w-8 h-8 text-purple-400 transform group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                        <span class="text-lg font-bold tracking-wider text-purple-50">EXPERT</span>
                    </button>
                    <!-- Impossible -->
                    <button data-level="7" class="level-btn col-span-2 relative overflow-hidden group py-5 rounded-2xl bg-white-[0.03] hover:bg-red-500/10 border border-red-500/20 hover:border-red-500/50 transition-all duration-300 shadow-md flex items-center justify-center gap-3">
                        <div class="absolute inset-0 bg-gradient-to-r from-red-500/5 via-transparent to-red-500/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <svg class="w-6 h-6 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M13.477 14.89A6 6 0 015.11 6.524l8.367 8.368zm1.414-1.414L6.524 5.11a6 6 0 018.367 8.367zM18 10a8 8 0 11-16 0 8 8 0 0116 0z" clip-rule="evenodd"></path></svg>
                        <span class="text-lg font-bold tracking-widest text-red-100">IMPOSSIBLE</span>
                    </button>
                </div>
            </div>

            <!-- Clean utility buttons -->
            <button id="rules-menu-btn" class="group flex items-center gap-2 px-6 py-2.5 rounded-full text-sm font-semibold tracking-wide text-gray-300 hover:text-white bg-white/5 hover:bg-white/10 border border-white/10 transition-all shadow-lg backdrop-blur-md shrink-0 mt-8 mb-auto">
                <svg class="w-5 h-5 text-gray-400 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                HOW TO PLAY
            </button>
        </div>

        <!-- Game Level Container (Hidden initially) -->
        <div id="game-container" class="absolute inset-0 z-40 bg-transparent transition-all duration-500 hidden pointer-events-none">
            <div class="relative w-full h-full flex flex-col justify-between pointer-events-auto">
                <!-- Header -->
                <div class="glass-header border-b border-white/10 py-3 px-5 md:px-8 flex flex-row items-center justify-between shadow-xl shrink-0">
                    <h2 id="level-title" class="text-xl md:text-2xl font-extrabold tracking-widest text-white drop-shadow-md">EASY</h2>
                    <div class="flex items-center gap-2.5 bg-black/50 backdrop-blur-md rounded-full px-5 py-2 border border-white/10 shadow-inner">
                        <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-8m-4 8l-4-8"></path></svg>
                        <span class="text-gray-400 font-semibold text-xs tracking-wider">MOVES</span> 
                        <span id="moves-counter" class="text-cyan-400 text-lg md:text-xl font-bold font-mono">0</span>
                    </div>
                </div>
                
                <!-- Dynamic Bottles Grid -->
                <div id="bottles-grid" class="flex-1 relative flex flex-wrap justify-center items-center gap-x-6 gap-y-12 md:gap-x-12 px-2 transition-all duration-300">
                    <!-- Bottles injected here dynamically -->
                </div>

                <!-- Modern Bottom Controls -->
                <div class="w-full p-4 bg-gradient-to-t from-black via-black/80 to-transparent z-30 shrink-0">
                    <div class="flex justify-center gap-4 max-w-sm mx-auto backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl p-1.5 shadow-2xl">
                        <button id="home-game-btn" class="flex-1 flex items-center justify-center gap-2 bg-transparent hover:bg-white/10 py-3.5 rounded-2xl font-bold tracking-wider text-sm text-gray-300 hover:text-white transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                            MENU
                        </button>
                        <div class="w-px bg-white/10 my-1"></div>
                        <button id="restart-game-btn" class="flex-1 flex items-center justify-center gap-2 bg-transparent hover:bg-blue-500/20 py-3.5 rounded-2xl font-bold tracking-wider text-sm text-blue-400 hover:text-blue-300 transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            RESET
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sleek Rules Overlay -->
        <div id="rules-overlay" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-xl flex items-center justify-center opacity-0 invisible transition-all duration-300">
            <div class="bg-[#0f172a] w-[90%] max-w-lg rounded-[2rem] p-8 border border-white/10 shadow-[0_30px_60px_rgba(0,0,0,0.8)] transform scale-95 transition-transform duration-300 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 w-40 h-40 bg-blue-500/10 rounded-full blur-3xl rounded-none pointer-events-none"></div>
                
                <h3 class="text-3xl font-extrabold text-white mb-8 flex items-center gap-4">
                    <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    Guide
                </h3>

                <div class="space-y-6 text-gray-300 leading-relaxed font-medium">
                    <div class="flex items-start gap-4">
                        <div class="mt-1 bg-amber-500/20 p-2 rounded-xl text-amber-400">
                            <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                        </div>
                        <p><span class="text-white block font-bold text-lg mb-1">Objective</span> Sort colors until every tube holds exactly one color.</p>
                    </div>

                    <div class="flex items-start gap-4">
                        <div class="mt-1 bg-cyan-500/20 p-2 rounded-xl text-cyan-400">
                            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                        </div>
                        <p><span class="text-white block font-bold text-lg mb-1">Pouring Rule</span> Space must exist in the target tube, and the topmost colors must match (or pour into an empty tube).</p>
                    </div>
                </div>

                <button id="close-rules-btn" class="mt-10 w-full py-4 rounded-xl bg-white text-[#0f172a] font-bold tracking-widest hover:bg-gray-200 transition-all">CONTINUE</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
