<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8278748118891475" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍 Cartoon Snake | Fun Apple Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen" class="loading-screen">
    <div class="loading-content">
        <div class="cartoon-logo"></div>
        <h1 class="loading-title">SNAKE ADVENTURE</h1>
        <div class="progress-container">
            <div class="progress-fill" id="loadFill"></div>
        </div>
        <p class="loading-text">LOADING FUN...</p>
        <div class="loading-percent" id="loadPercent">0%</div>
    </div>
</div>

<!-- SETTINGS SCREEN -->
<div id="settingsScreen" class="d-none">
    <div class="settings-container">
        <div class="cartoon-card settings-panel">
            <div class="settings-header">
                <h2>🎮 GAME SETTINGS</h2>
            </div>

            <div class="setting-field">
                <label class="setting-label">PLAYER NAME</label>
                <input type="text" id="playerName" class="setting-input" placeholder="Enter Name" maxlength="15" value="CARTOON HERO">
            </div>

            <div class="setting-field">
                <label class="setting-label">DIFFICULTY</label>
                <div class="difficulty-group">
                    <button class="difficulty-btn" data-speed="180">EASY</button>
                    <button class="difficulty-btn active" data-speed="130">MEDIUM</button>
                    <button class="difficulty-btn" data-speed="80">HARD</button>
                </div>
            </div>

            <div class="setting-field toggle-row">
                <label class="setting-label">SOUND EFFECTS</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="soundToggle" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div class="highscore-box">
                <div class="highscore-label">🏆 HIGH SCORE</div>
                <div id="settingsHighScore" class="highscore-value">0</div>
            </div>

            <button id="startGameBtn" class="start-btn">🌟 START GAME 🌟</button>
            <div class="controls-hint">← ↑ ↓ →  or  WASD  |  Touch the arrows!</div>
        </div>
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="d-none">
    <div class="game-wrapper">
        <div class="game-header">
            <div class="player-badge">
                <span>🐍</span>
                <span id="gamePlayerName" class="player-name">PLAYER</span>
            </div>
            <div class="score-panel">
                <div class="score-item">
                    <div class="score-label">SCORE</div>
                    <div id="currentScore" class="score-number">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">BEST</div>
                    <div id="gameHighScore" class="score-number">0</div>
                </div>
            </div>
            <div class="action-buttons">
                <button id="pauseBtn" class="action-icon">⏸</button>
                <button id="restartBtn" class="action-icon">🔄</button>
                <button id="exitBtn" class="action-icon">🏠</button>
            </div>
        </div>

        <div class="arena">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>
        <div class="mobile-actions">
    <button id="pauseBtnMobile" class="mobile-btn">⏸</button>
    <button id="restartBtnMobile" class="mobile-btn">🔄</button>
    <button id="exitBtnMobile" class="mobile-btn">🏠</button>
</div>

    </div>
</div>


<!-- GAME OVERLAY -->
    <div id="gameOverlay" class="gameover-overlay d-none">
        <div class="gameover-card">
            <div class="modal-accent"></div>
            <div class="modal-content-inner">
                <!-- Header with icon & title -->
                <div class="gameover-header-group">
                    <div class="gameover-icon">🎮</div>
                    <h2 class="gameover-title">GAME OVER</h2>
                </div>

                <!-- Modern Score Card -->
                <div class="score-modern-card">
                    <div class="final-score-label">YOUR SCORE</div>
                    <div id="finalScoreDisplay" class="final-score">0</div>
                </div>

                <!-- Dynamic Jungle Message Area (Stylish chip) -->
                <div id="jungleMessageBox" class="jungle-message">
                    <span>🌿</span>
                    <span id="dynamicMessage">Better luck next time, explorer!</span>
                    <span>🍃</span>
                </div>

                <!-- HighScore Indicator (Premium record badge) -->
                <div style="text-align: center;">
                    <div id="highScoreContainer" class="high-score-badge">
                        🏆 JUNGLE RECORD &nbsp;→&nbsp; <span id="displayHighScoreSpan">0</span>
                    </div>
                </div>

                <!-- Button Group with modern layout -->
                <div class="button-group">
                    <button id="gameoverRestart" class="gameover-btn primary">
                        🔄 PLAY AGAIN
                    </button>
                    <button id="gameoverExit" class="gameover-btn secondary">
                        🏠 MAIN MENU
                    </button>
                </div>
            </div>
        </div>
    </div>


<script src="script.js"></script>
</body>
</html>
