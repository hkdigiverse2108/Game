<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Brick Breaker</title>
    <link rel="stylesheet" href="http://fonts.googleapis.com/css?family=Germania+One">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
</head>

<body>

    <div id="game-container">
        <!-- Loading Screen -->
        <div id="loading-screen" class="screen active">
            <!-- The title is integrated into jungle_loading_clean.png -->
            <div style="flex-grow: 1;"></div> <!-- spacer -->
            <div id="progress-wrapper" style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 10px;">
                <div id="progress-container" style="margin-bottom: 5px;">
                    <div id="progress-bar"></div>
                </div>
                <p id="loading-text" style="color:#5d4037; font-weight:bold; font-size:22px; text-shadow: 1px 1px 0px #fff; margin:0;">Loading...</p>
            </div>
            <div id="loading-play-btn" style="display: none; cursor: pointer; text-align: center;">
                <svg width="180" height="80" viewBox="0 0 180 80">
                    <!-- Cream wood button body -->
                    <rect x="5" y="10" width="170" height="65" rx="20" fill="#a08a70" />
                    <rect x="5" y="5" width="170" height="65" rx="20" fill="#f5deb3" stroke="#8b5a2b"
                        stroke-width="4" />
                    <!-- inner wood grain details in light brown -->
                    <path d="M 20 20 Q 50 15 80 20 T 160 20" stroke="#d2b48c" stroke-width="2" fill="none"
                        opacity="0.8" />
                    <path d="M 20 50 Q 80 55 120 50 T 160 50" stroke="#d2b48c" stroke-width="2" fill="none"
                        opacity="0.8" />
                    <!-- play icon in dark brown for contrast -->
                    <path d="M80,25 L110,40 L80,55 Z" fill="#8bc34a" stroke="#558b2f" stroke-width="3"
                        stroke-linejoin="round" />
                </svg>
                <p style="color:#5d4037; font-weight:bold; font-size:24px; text-shadow: 1px 1px 0px #fff; margin-top: 5px;">Let's Play!</p>
            </div>
            <div style="flex-grow: 0.2;"></div>
        </div>

        <!-- Level Selection Screen -->
        <div id="level-screen" class="screen">
            <div class="level-header">
                <h2>Select Level</h2>
            </div>
            <div class="level-slider">
                <!-- Pages will be generated dynamically -->
            </div>
            <div class="slider-controls">
                <button id="prev-page-btn" disabled>&lt;</button>
                <span id="page-indicator">1 / ?</span>
                <button id="next-page-btn">&gt;</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="top-bar">
                <button id="home-btn" class="icon-btn"><i class="fas fa-home"></i></button>
                <div class="stats-header">
                    <span id="score-display"><img src="img/score.png" alt="score"> <span id="score-val">0</span></span>
                    <span id="level-display"><img src="img/level.png" alt="level"> <span id="level-val">1</span></span>
                    <span id="life-display"><img src="img/life.png" alt="life"> <span id="life-val">3</span></span>
                </div>
                <button id="sound-btn" class="icon-btn"><img src="img/SOUND_ON.png" alt="sound-on" id="sound"></button>
            </div>

            <div id="gameover">
                <div class="popup-box">
                    <h2 id="popup-title">Level Complete!</h2>
                    <p id="popup-level-txt">Level: 1</p>
                    <p id="popup-score-txt">Score: 0</p>
                    <div class="stars-container">
                        <i class="fas fa-star" id="star-1"></i>
                        <i class="fas fa-star" id="star-2"></i>
                        <i class="fas fa-star" id="star-3"></i>
                    </div>
                    <div class="popup-buttons">
                        <button id="restart-btn" class="btn">Play Again</button>
                        <button id="next-level-btn" class="btn">Next Level</button>
                        <button id="popup-home-btn" class="btn">Home</button>
                    </div>
                </div>
            </div>

            <canvas id="breakout" width="600" height="700"></canvas>
        </div>
    </div>

    <script src="components.js"></script>
    <script src="game.js"></script>
</body>

</html>
