<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Angry Birds</title>
		<meta property="og:title" content="Angry Birds"/>
		<meta property="og:url" content="https://lrusso.github.io/AngryBirds/AngryBirds.htm"/>
		<meta property="og:description" content="info@lrusso.com"/>
		<meta property="og:image" content="https://lrusso.github.io/AngryBirds/AngryBirdsShare.png"/>
		<meta property="og:type" content="website"/>
		<meta property="og:site_name" content="AngryBirds"/>
		<meta name="theme-color" content="#000000"/>
		<meta name="mobile-web-app-capable" content="yes"/>
		<meta name="apple-mobile-web-app-capable" content="yes"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, user-scalable=no"/>
		<link rel="manifest" href="AngryBirds.json"/>
		<link rel="icon" sizes="16x16" type="image/png" href="AngryBirdsFavIcon_16x16.png"/>
		<link rel="icon" sizes="192x192" type="image/png" href="AngryBirdsFavIcon_192x192.png"/>
		<style>
			/* ── Base reset ────────────────────────────────────── */
			html, body {
				background-color: black;
				height: 100%;
				padding: 0;
				margin: 0;
				overflow: hidden;
				touch-action: none;
				-webkit-user-select: none;
				-moz-user-select: none;
				user-select: none;
				-webkit-tap-highlight-color: transparent;
			}

			/* ── Game canvas container ─────────────────────────── */
			#content {
				position: fixed;
				height: 100%;
				width: 100%;
				margin: 0;
				padding: 0;
				z-index: 99;
			}

			/* ── Loading spinner ───────────────────────────────── */
			.pleasewait {
				position: fixed;
				width: 64px;
				height: 64px;
				left: 0; right: 0; top: 0; bottom: 0;
				margin: auto;
				border: 0;
				z-index: 9;
			}
			.lds-spinner {
				color: white;
				display: inline-block;
				position: relative;
				width: 64px;
				height: 64px;
			}
			.lds-spinner div {
				transform-origin: 32px 32px;
				animation: lds-spinner 1.2s linear infinite;
			}
			.lds-spinner div:after {
				content: " ";
				display: block;
				position: absolute;
				top: 3px; left: 29px;
				width: 5px; height: 14px;
				border-radius: 20%;
				background: white;
			}
			.lds-spinner div:nth-child(1)  { transform: rotate(0deg);   animation-delay: -1.1s }
			.lds-spinner div:nth-child(2)  { transform: rotate(30deg);  animation-delay: -1s   }
			.lds-spinner div:nth-child(3)  { transform: rotate(60deg);  animation-delay: -0.9s }
			.lds-spinner div:nth-child(4)  { transform: rotate(90deg);  animation-delay: -0.8s }
			.lds-spinner div:nth-child(5)  { transform: rotate(120deg); animation-delay: -0.7s }
			.lds-spinner div:nth-child(6)  { transform: rotate(150deg); animation-delay: -0.6s }
			.lds-spinner div:nth-child(7)  { transform: rotate(180deg); animation-delay: -0.5s }
			.lds-spinner div:nth-child(8)  { transform: rotate(210deg); animation-delay: -0.4s }
			.lds-spinner div:nth-child(9)  { transform: rotate(240deg); animation-delay: -0.3s }
			.lds-spinner div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s }
			.lds-spinner div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s }
			.lds-spinner div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s    }
			@keyframes lds-spinner { 0% { opacity: 1 } 100% { opacity: 0 } }

			/* ── Portrait → rotate to landscape ───────────────── */
			@media only screen and (orientation: portrait) {
				#content {
					position: fixed;
					transform: rotate(-90deg);
					transform-origin: left top;
					width: 100vh;
					overflow-x: hidden;
					top: 100%;
					left: 0;
				}
			}
		</style>
	</head>
	<body>
		<!-- Loading spinner (hidden by the game canvas once loaded) -->
		<div class="pleasewait" id="loading">
			<div class="lds-spinner">
				<div></div><div></div><div></div><div></div>
				<div></div><div></div><div></div><div></div>
				<div></div><div></div><div></div><div></div>
			</div>
		</div>

		<!-- Phaser mounts the canvas here -->
		<div id="content" oncontextmenu="return false;"></div>

		<script>
			/*
			 * Redirect cookie-based level-progress storage to sessionStorage.
			 * This means progress is kept only while the browser tab is open
			 * (i.e. "while the game is playing") and resets on a new session.
			 */
			(function () {
				var COOKIE_KEY = "solvedlevelsangrybirds";
				var _store = {};

				// Seed from sessionStorage on page load
				var _saved = sessionStorage.getItem(COOKIE_KEY);
				if (_saved !== null) {
					_store[COOKIE_KEY] = _saved;
				}

				Object.defineProperty(document, "cookie", {
					configurable: true,
					get: function () {
						return Object.keys(_store)
							.map(function (k) { return k + "=" + _store[k]; })
							.join("; ");
					},
					set: function (val) {
						// Parse "name=value; ..." and mirror in sessionStorage
						var parts = val.split(";");
						var kv    = parts[0].split("=");
						if (kv.length >= 2) {
							var name  = kv[0].trim();
							var value = kv.slice(1).join("=").trim();
							_store[name] = value;
							try {
								sessionStorage.setItem(name, value);
							} catch (e) {}
						}
					}
				});
			}());
		</script>

		<!-- Main game script (Phaser + all 20 levels) -->
		<script src="AngryBirdsGame.js"></script>
	</body>
</html>
