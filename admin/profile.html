<!doctype html>
<html lang="en" class="dark">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/tailwind.config.js"></script>
    <link href="../assets/css/style.css" rel="stylesheet" />
  </head>
  <body class="antialiased min-h-screen transition-colors duration-300 bg-[#f4f6fb] text-slate-900 dark:bg-background dark:text-white selection:bg-primary/30 selection:text-white">
    <div id="admin-app"></div>
    <template id="page-template">
      <section class="rounded-[2rem] border border-slate-200 bg-white shadow-[0_24px_80px_rgba(15,23,42,0.08)] overflow-hidden dark:border-white/10 dark:bg-black/35 dark:shadow-2xl">
        <div class="relative overflow-hidden px-6 py-8 sm:px-8 sm:py-10 border-b border-slate-200/80 dark:border-white/10">
          <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_rgba(99,102,241,0.15),_transparent_30%),radial-gradient(circle_at_bottom_left,_rgba(236,72,153,0.1),_transparent_32%)]"></div>
          <div class="relative flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
            <div class="flex flex-col sm:flex-row sm:items-center gap-5">
              <div class="relative">
                <div id="profile-avatar" class="flex h-24 w-24 items-center justify-center rounded-full bg-gradient-to-br from-primary via-indigo-500 to-secondary text-2xl font-black text-white shadow-[0_18px_35px_rgba(99,102,241,0.35)] ring-8 ring-white/70 dark:ring-black/30"></div>
              </div>
              <div>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-500 dark:text-gray-500">Profile</p>
                <h3 id="profile-name-heading" class="mt-2 text-3xl font-black text-slate-900 dark:text-white">Admin</h3>
                <p class="mt-2 max-w-2xl text-slate-600 dark:text-gray-400 leading-relaxed">Manage account information and security settings from one polished place.</p>
              </div>
            </div>

            <button id="edit-profile-btn" type="button" class="inline-flex items-center justify-center rounded-2xl bg-gradient-to-r from-primary via-indigo-500 to-secondary px-5 py-3 font-bold text-white shadow-lg shadow-primary/20 transition hover:-translate-y-0.5 active:translate-y-0">
              Edit Profile
            </button>
          </div>
        </div>

        <div class="px-4 sm:px-6 pt-6">
          <div class="grid grid-cols-2 gap-2 rounded-[1.5rem] border border-slate-200 bg-slate-50 p-2 dark:border-white/10 dark:bg-white/5">
            <button type="button" data-tab="details" class="tab-btn w-full rounded-2xl px-4 py-3 text-center text-sm font-semibold transition bg-primary text-white shadow-lg shadow-primary/20">
              Profile Details
            </button>
            <button type="button" data-tab="password" class="tab-btn w-full rounded-2xl px-4 py-3 text-center text-sm font-semibold text-slate-600 transition hover:bg-white dark:text-gray-300 dark:hover:bg-white/5">
              Change Password
            </button>
          </div>
        </div>

        <div class="p-6 sm:p-8">
          <div id="details-panel" class="space-y-6">
            <div id="profile-readonly" class="grid gap-4 sm:grid-cols-3">
              <article class="rounded-2xl border border-slate-200 bg-slate-50 p-5 shadow-sm dark:border-white/10 dark:bg-black/25">
                <p class="text-xs uppercase tracking-[0.24em] text-slate-500 dark:text-gray-500">Name</p>
                <p id="readonly-name" class="mt-3 text-lg font-bold text-slate-900 dark:text-white">Admin</p>
              </article>
              <article class="rounded-2xl border border-slate-200 bg-slate-50 p-5 shadow-sm dark:border-white/10 dark:bg-black/25">
                <p class="text-xs uppercase tracking-[0.24em] text-slate-500 dark:text-gray-500">Email</p>
                <p id="readonly-email" class="mt-3 text-lg font-bold text-slate-900 dark:text-white break-all">admin@example.com</p>
              </article>
              <article class="rounded-2xl border border-slate-200 bg-slate-50 p-5 shadow-sm dark:border-white/10 dark:bg-black/25">
                <p class="text-xs uppercase tracking-[0.24em] text-slate-500 dark:text-gray-500">Phone</p>
                <p id="readonly-phone" class="mt-3 text-lg font-bold text-slate-900 dark:text-white">Not provided</p>
              </article>
            </div>

            <form id="profile-form" class="hidden space-y-5 rounded-[1.75rem] border border-slate-200 bg-white p-5 shadow-[0_18px_40px_rgba(15,23,42,0.06)] dark:border-white/10 dark:bg-black/25" novalidate>
              <div class="grid gap-5 sm:grid-cols-2">
                <div>
                  <label for="firstname" class="block text-sm font-semibold text-slate-700 dark:text-gray-200 mb-2">First Name</label>
                  <input id="firstname" name="firstname" type="text" required class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/15 dark:border-white/10 dark:bg-black/35 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary/60 dark:focus:ring-primary/25" />
                </div>
                <div>
                  <label for="lastname" class="block text-sm font-semibold text-slate-700 dark:text-gray-200 mb-2">Last Name</label>
                  <input id="lastname" name="lastname" type="text" required class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/15 dark:border-white/10 dark:bg-black/35 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary/60 dark:focus:ring-primary/25" />
                </div>
              </div>

              <div class="grid gap-5 sm:grid-cols-2">
                <div>
                  <label for="email" class="block text-sm font-semibold text-slate-700 dark:text-gray-200 mb-2">Email</label>
                  <input id="email" name="email" type="email" required class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/15 dark:border-white/10 dark:bg-black/35 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary/60 dark:focus:ring-primary/25" />
                </div>
                <div>
                  <label for="phone" class="block text-sm font-semibold text-slate-700 dark:text-gray-200 mb-2">Phone</label>
                  <input id="phone" name="phone" type="tel" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/15 dark:border-white/10 dark:bg-black/35 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary/60 dark:focus:ring-primary/25" />
                </div>
              </div>

              <p id="profile-message" class="min-h-5 text-sm font-medium" aria-live="polite"></p>

              <div class="flex flex-col sm:flex-row gap-3">
                <button type="submit" class="inline-flex items-center justify-center rounded-2xl bg-gradient-to-r from-primary via-indigo-500 to-secondary px-6 py-3.5 font-bold text-white shadow-lg shadow-primary/20 transition hover:-translate-y-0.5 active:translate-y-0">
                  Save changes
                </button>
                <button id="cancel-edit-btn" type="button" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white px-6 py-3.5 font-bold text-slate-700 transition hover:bg-slate-50 dark:border-white/10 dark:bg-white/5 dark:text-white dark:hover:bg-white/10">
                  Cancel
                </button>
              </div>
            </form>
          </div>

          <div id="password-panel" class="hidden max-w-2xl">
            <div class="mb-6 rounded-[1.75rem] border border-slate-200 bg-slate-50 p-5 dark:border-white/10 dark:bg-black/25">
              <h4 class="text-xl font-black text-slate-900 dark:text-white">Change Password</h4>
              <p class="mt-2 text-slate-600 dark:text-gray-400 leading-relaxed">Update your password to keep the admin account secure.</p>
            </div>

            <form id="password-form" class="space-y-5 rounded-[1.75rem] border border-slate-200 bg-white p-5 shadow-[0_18px_40px_rgba(15,23,42,0.06)] dark:border-white/10 dark:bg-black/25" novalidate>
              <div>
                <label for="oldPassword" class="block text-sm font-semibold text-slate-700 dark:text-gray-200 mb-2">Old Password</label>
                <div class="relative">
                  <input id="oldPassword" name="oldPassword" type="password" required class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 pr-12 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/15 dark:border-white/10 dark:bg-black/35 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary/60 dark:focus:ring-primary/25" />
                  <button type="button" data-password-toggle="oldPassword" aria-label="Show password" class="absolute inset-y-0 right-3 my-auto inline-flex h-9 w-9 items-center justify-center rounded-xl text-slate-500 transition hover:bg-slate-100 hover:text-slate-900 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-white">
                    <svg data-icon="show" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <svg data-icon="hide" class="hidden h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.966 9.966 0 012.042-3.592M6.223 6.223A9.96 9.96 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.969 9.969 0 01-4.293 5.362M9.88 9.88a3 3 0 104.243 4.243"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18"></path>
                    </svg>
                  </button>
                </div>
              </div>
              <div>
                <label for="newPassword" class="block text-sm font-semibold text-slate-700 dark:text-gray-200 mb-2">New Password</label>
                <div class="relative">
                  <input id="newPassword" name="newPassword" type="password" required class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 pr-12 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/15 dark:border-white/10 dark:bg-black/35 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary/60 dark:focus:ring-primary/25" />
                  <button type="button" data-password-toggle="newPassword" aria-label="Show password" class="absolute inset-y-0 right-3 my-auto inline-flex h-9 w-9 items-center justify-center rounded-xl text-slate-500 transition hover:bg-slate-100 hover:text-slate-900 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-white">
                    <svg data-icon="show" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <svg data-icon="hide" class="hidden h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.966 9.966 0 012.042-3.592M6.223 6.223A9.96 9.96 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.969 9.969 0 01-4.293 5.362M9.88 9.88a3 3 0 104.243 4.243"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18"></path>
                    </svg>
                  </button>
                </div>
              </div>
              <div>
                <label for="confirmPassword" class="block text-sm font-semibold text-slate-700 dark:text-gray-200 mb-2">Confirm Password</label>
                <div class="relative">
                  <input id="confirmPassword" name="confirmPassword" type="password" required class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 pr-12 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/15 dark:border-white/10 dark:bg-black/35 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-primary/60 dark:focus:ring-primary/25" />
                  <button type="button" data-password-toggle="confirmPassword" aria-label="Show password" class="absolute inset-y-0 right-3 my-auto inline-flex h-9 w-9 items-center justify-center rounded-xl text-slate-500 transition hover:bg-slate-100 hover:text-slate-900 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-white">
                    <svg data-icon="show" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <svg data-icon="hide" class="hidden h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.966 9.966 0 012.042-3.592M6.223 6.223A9.96 9.96 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.969 9.969 0 01-4.293 5.362M9.88 9.88a3 3 0 104.243 4.243"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18"></path>
                    </svg>
                  </button>
                </div>
              </div>

              <p id="password-message" class="min-h-5 text-sm font-medium" aria-live="polite"></p>

              <button type="submit" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-slate-900 px-6 py-3.5 font-bold text-white transition hover:bg-slate-800 dark:border-white/10 dark:bg-white dark:text-slate-900 dark:hover:bg-slate-100">
                Update password
              </button>
            </form>
          </div>
        </div>
      </section>
    </template>
    <script type="module" src="./js/profile.js"></script>
  </body>
</html>
